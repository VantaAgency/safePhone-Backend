# Pre-commit hooks for the SafePhone backend.
# Run `pre-commit install` once to register the git hook; from then on, every
# `git commit` runs these checks and aborts the commit if any check fails.
#
# To bypass in an emergency: `git commit --no-verify` (don't make a habit of it).
# To run manually against all files: `pre-commit run --all-files`.

repos:
  # gitleaks scans staged files for committed secrets (Stripe / DEXPAY / JWT
  # keys, AWS credentials, etc). The default rules cover ~150 providers.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
